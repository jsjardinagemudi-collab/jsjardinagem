    :root {
      --vermelho:#a7271d;
      --amarelo:#ffe15a;
      --verde:#2f6b28;
      --verde-claro:#eaf4dc;
      --bege:#f7f0df;
      --dourado:#c79421;
      --texto:#2b2b1f;
    }

    body {
      font-family: Arial, sans-serif;
      background:var(--bege);
      color:var(--texto);
      padding-bottom:100px;
    }

    .header-logo {
      background:#b11f17;
      border-bottom:6px solid var(--dourado);
    }

    .logo-banner {
      width:100%;
      display:block;
    }

    .container {
      width:min(1180px,94%);
      margin:auto;
      padding:20px 0;
    }

    .box {
      background:white;
      border-radius:18px;
      padding:17px;
      margin-bottom:18px;
      box-shadow:0 5px 16px rgba(0,0,0,.10);
      border:1px solid #eee0bd;
    }

    h1 {
      color:var(--vermelho);
      font-size:1.8rem;
      margin-bottom:8px;
    }

    h2 {
      color:var(--vermelho);
      margin-bottom:10px;
      font-size:1.25rem;
    }

    .aviso {
      background:#fff6d6;
      border-left:6px solid var(--dourado);
      padding:13px;
      border-radius:12px;
      margin-bottom:14px;
      font-weight:bold;
    }

    input, select, textarea {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #cfc2a4;
      font-size:1rem;
    }

    .form-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
      margin-top:12px;
    }

    .grupo-filtro {
      margin-top:14px;
    }

    .grupo-filtro strong {
      display:block;
      margin-bottom:7px;
      color:var(--verde);
    }

    .botoes {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .botoes button {
      border:none;
      border-radius:999px;
      padding:10px 13px;
      background:#efe7d4;
      font-weight:bold;
      cursor:pointer;
      color:#402b19;
    }

    .botoes button.ativo {
      background:var(--vermelho);
      color:var(--amarelo);
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:16px;
    }

    .card {
      background:white;
      border-radius:16px;
      box-shadow:0 4px 14px rgba(0,0,0,.12);
      border:1px solid #ead9ae;
      display:flex;
      flex-direction:column;
      padding:14px;
    }

    .tag {
      display:inline-block;
      background:var(--verde-claro);
      color:var(--verde);
      padding:5px 8px;
      border-radius:999px;
      font-size:.73rem;
      font-weight:bold;
      margin:0 4px 7px 0;
    }

    .card h3 {
      color:var(--vermelho);
      font-size:1.02rem;
      margin-bottom:7px;
      min-height:38px;
    }

    .codigo {
      font-size:.82rem;
      background:#f7f0df;
      border-radius:9px;
      padding:7px;
      margin-bottom:10px;
      color:#4b3a21;
      font-weight:bold;
    }

    .qtd {
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:auto;
    }

    .qtd button {
      width:38px;
      height:38px;
      border:none;
      border-radius:9px;
      background:var(--vermelho);
      color:var(--amarelo);
      font-size:1.3rem;
      font-weight:bold;
      cursor:pointer;
    }

    .qtd input {
      width:62px;
      height:38px;
      text-align:center;
      border:1px solid #d4c79f;
      border-radius:9px;
      font-weight:bold;
    }

    .btn {
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
    }

    .btn-ver {
      background:var(--vermelho);
      color:var(--amarelo);
    }

    .btn-barcode {
      background:#efe7d4;
      color:#402b19;
      margin-bottom:10px;
      width:100%;
    }

    .btn-whats {
      background:#25d366;
      color:white;
      width:100%;
      margin-top:10px;
    }

    .btn-fechar {
      background:#ddd;
      width:100%;
      margin-top:8px;
    }

    .barra {
      position:fixed;
      left:10px;
      right:10px;
      bottom:10px;
      background:white;
      border:3px solid var(--dourado);
      border-radius:18px;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      box-shadow:0 10px 30px rgba(0,0,0,.24);
      z-index:999;
    }

    .barra strong { color:var(--vermelho); }

    .modal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.58);
      z-index:1000;
      padding:14px;
    }

    .modal-content {
      background:white;
      max-width:650px;
      margin:25px auto;
      border-radius:20px;
      padding:16px;
      max-height:92vh;
      overflow:auto;
      border:5px solid var(--dourado);
    }

    .linha {
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #eee;
      padding:8px 0;
      gap:10px;
      font-size:.92rem;
    }

    .barcode-box {
      text-align:center;
      padding:15px;
      background:#fff;
      border-radius:15px;
    }

    .barcode-box svg {
      max-width:100%;
    }

    footer {
      text-align:center;
      padding:24px;
      color:#5b6653;
      font-size:.9rem;
    }

    @media(max-width:650px) {
      .barra {
        flex-direction:column;
        align-items:stretch;
      }

      .btn-ver { width:100%; }
    }
  </style>
</head>

<body>

<header class="header-logo">
  <img src="imagens/logo-topo-rei-do-real.png" alt="Rei do Real Casa e Jardim" class="logo-banner">
</header>

<main class="container">

  <section class="box">
    <h1>Reposição Rei do Real</h1>
    <div class="aviso">
      Pedido interno para reposição de produtos em falta nas lojas.
    </div>

    <div class="form-grid">
      <div>
        <label><strong>Loja</strong></label>
        <select id="loja">
          <option value="">Selecione a loja</option>
          <option>Tubal</option>
          <option>Catalão</option>
          <option>Araguari</option>
          <option>João Pessoa</option>
          <option>Planalto</option>
          <option>Atacado</option>
        </select>
      </div>

      <div>
        <label><strong>Nome de quem preencheu</strong></label>
        <input id="responsavel" type="text" placeholder="Ex: Adriano">
      </div>
    </div>
  </section>

  <section class="box">
    <h2>Filtros</h2>

    <div class="grupo-filtro">
      <strong>Seção</strong>
      <div class="botoes" id="filtroCategoria">
        <button class="ativo" onclick="setFiltro('categoria','todos',this)">Tudo</button>
        <button onclick="setFiltro('categoria','plantas',this)">Plantas</button>
        <button onclick="setFiltro('categoria','terras',this)">Terras</button>
        <button onclick="setFiltro('categoria','vasos',this)">Vasos</button>
      </div>
    </div>

    <div class="grupo-filtro">
      <strong>Marca</strong>
      <div class="botoes" id="filtroMarca"></div>
    </div>

    <div class="grupo-filtro">
      <strong>Buscar produto</strong>
      <input id="busca" type="text" placeholder="Digite nome, marca ou código de barras" oninput="renderizarProdutos()">
    </div>
  </section>

  <section class="box">
    <h2>Produtos para reposição</h2>
    <div class="grid" id="produtos"></div>
  </section>

</main>

<div class="barra">
  <div>
    <strong>Pedido de reposição</strong><br>
    <span id="miniItens">0 itens selecionados</span>
  </div>
  <button class="btn btn-ver" onclick="abrirResumo()">Ver pedido</button>
</div>

<div class="modal" id="modalResumo">
  <div class="modal-content">
    <h2>Resumo do pedido</h2>
    <div id="listaResumo"></div>

    <textarea id="obs" placeholder="Observações. Ex: produto urgente, mandar caixa fechada, confirmar estoque etc."></textarea>

    <button class="btn btn-whats" onclick="enviarWhatsApp()">Enviar pedido pelo WhatsApp</button>
    <button class="btn btn-fechar" onclick="fecharResumo()">Fechar</button>
  </div>
</div>

<div class="modal" id="modalBarcode">
  <div class="modal-content barcode-box">
    <h2 id="barcodeTitulo">Código de barras</h2>
    <svg id="barcodeSvg"></svg>
    <p id="barcodeNumero"></p>
    <button class="btn btn-fechar" onclick="fecharBarcode()">Fechar</button>
  </div>
</div>

<footer>
  Rei do Real Casa e Jardim • Página interna de reposição
</footer>

  const selecionados = {};
  const filtro = {
    categoria:"todos",
    marca:"todos"
  };

  function montarFiltroMarcas() {
    const area = document.getElementById("filtroMarca");
    const marcas = [...new Set(produtos.map(p => p.marca))].sort();

    area.innerHTML = `<button class="ativo" onclick="setFiltro('marca','todos',this)">Todas</button>`;

    marcas.forEach(marca => {
      area.innerHTML += `<button onclick="setFiltro('marca','${marca}',this)">${marca}</button>`;
    });
  }

  function setFiltro(tipoFiltro, valor, botao) {
    filtro[tipoFiltro] = valor;

    const grupo = botao.parentElement;
    grupo.querySelectorAll("button").forEach(btn => btn.classList.remove("ativo"));
    botao.classList.add("ativo");

    renderizarProdutos();
  }

  function renderizarProdutos() {
    const area = document.getElementById("produtos");
    const busca = document.getElementById("busca").value.toLowerCase();

    area.innerHTML = "";

    const filtrados = produtos
      .filter(p => filtro.categoria === "todos" || p.categoria === filtro.categoria)
      .filter(p => filtro.marca === "todos" || p.marca === filtro.marca)
      .filter(p =>
        p.nome.toLowerCase().includes(busca) ||
        p.marca.toLowerCase().includes(busca) ||
        p.codigo.includes(busca)
      );

    if (filtrados.length === 0) {
      area.innerHTML = "<p>Nenhum produto encontrado.</p>";
      return;
    }

    filtrados.forEach(p => {
      const index = produtos.indexOf(p);
      selecionados[index] = selecionados[index] || 0;

      area.innerHTML += `
        <div class="card">
          <div>
            <span class="tag">${p.categoria.toUpperCase()}</span>
            <span class="tag">${p.marca}</span>
          </div>

          <h3>${p.nome}</h3>

          <div class="codigo">Código de barras: ${p.codigo}</div>

          <p>${p.descricao}</p>

          <button class="btn btn-barcode" onclick="abrirBarcode('${p.codigo}', '${p.nome.replace(/'/g, "")}')">
            Ver código de barras
          </button>

          <div class="qtd">
            <button onclick="alterarQtd(${index}, -1)">-</button>
            <input value="${selecionados[index]}" id="qtd-${index}" readonly>
            <button onclick="alterarQtd(${index}, 1)">+</button>
          </div>
        </div>
      `;
    });
  }

  function alterarQtd(index, valor) {
    selecionados[index] = Math.max(0, (selecionados[index] || 0) + valor);
    const input = document.getElementById(`qtd-${index}`);
    if (input) input.value = selecionados[index];
    atualizarResumoMini();
  }

  function atualizarResumoMini() {
    let totalItens = 0;

    produtos.forEach((p, i) => {
      totalItens += selecionados[i] || 0;
    });

    document.getElementById("miniItens").innerText =
      `${totalItens} item${totalItens !== 1 ? "s" : ""} selecionado${totalItens !== 1 ? "s" : ""}`;
  }

  function abrirResumo() {
    const lista = document.getElementById("listaResumo");
    lista.innerHTML = "";

    let encontrou = false;

    produtos.forEach((p, i) => {
      const qtd = selecionados[i] || 0;

      if (qtd > 0) {
        encontrou = true;
        lista.innerHTML += `
          <div class="linha">
            <span>
              <strong>${qtd}x ${p.nome}</strong><br>
              Marca: ${p.marca}<br>
              Código: ${p.codigo}
            </span>
          </div>
        `;
      }
    });

    if (!encontrou) {
      lista.innerHTML = "<p>Nenhum item selecionado ainda.</p>";
    }

    document.getElementById("modalResumo").style.display = "block";
  }

  function fecharResumo() {
    document.getElementById("modalResumo").style.display = "none";
  }

  function enviarWhatsApp() {
    const loja = document.getElementById("loja").value;
    const responsavel = document.getElementById("responsavel").value.trim();
    const obs = document.getElementById("obs").value.trim();

    if (!loja) {
      alert("Selecione a loja antes de enviar.");
      return;
    }

    if (!responsavel) {
      alert("Preencha o nome de quem está fazendo o pedido.");
      return;
    }

    let itensTexto = "";
    let encontrou = false;

    produtos.forEach((p, i) => {
      const qtd = selecionados[i] || 0;

      if (qtd > 0) {
        encontrou = true;
        itensTexto += `- ${qtd}x ${p.nome} | Marca: ${p.marca} | Código: ${p.codigo}%0A`;
      }
    });

    if (!encontrou) {
      alert("Selecione pelo menos um produto para reposição.");
      return;
    }

    const mensagem =
      `*Pedido de Reposição - Rei do Real*%0A%0A` +
      `*Loja:* ${loja}%0A` +
      `*Preenchido por:* ${responsavel}%0A%0A` +
      `*Itens solicitados:*%0A` +
      `${itensTexto}%0A` +
      `*Observações:* ${obs || "Sem observações."}`;

    window.open(`https://wa.me/${WHATSAPP_DESTINO}?text=${mensagem}`, "_blank");
  }

  function abrirBarcode(codigo, nome) {
    document.getElementById("modalBarcode").style.display = "block";
    document.getElementById("barcodeTitulo").innerText = nome;
    document.getElementById("barcodeNumero").innerText = codigo;

    try {
      JsBarcode("#barcodeSvg", codigo, {
        format: "CODE128",
        lineColor: "#000",
        width: 2,
        height: 90,
        displayValue: true,
        fontSize: 18,
        margin: 10
      });
    } catch (e) {
      document.getElementById("barcodeSvg").innerHTML = "";
      document.getElementById("barcodeNumero").innerText =
        "Não foi possível gerar o código visual. Número: " + codigo;
    }
  }

  function fecharBarcode() {
    document.getElementById("modalBarcode").style.display = "none";
  }

  montarFiltroMarcas();
  renderizarProdutos();
  atualizarResumoMini();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Flavim MX School 100 | Curso de Motocross</title>

  <style>
    :root {
      --dark:#050505;
      --black:#0b0b0b;
      --blue:#0057ff;
      --white:#ffffff;
      --gray:#c9c9c9;
      --card:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.16);
      --whats:#25D366;
      --danger:#ef4444;
      --ok:#22c55e;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:var(--dark);
      color:var(--white);
      overflow-x:hidden;
    }

    a{text-decoration:none;color:inherit}

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:100;
      padding:12px 5%;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      font-weight:950;
      text-transform:uppercase;
      font-size:15px;
    }

    .brand span{color:var(--blue)}

    .top-actions{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .top-btn{
      font-size:12px;
      font-weight:900;
      padding:9px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.14);
    }

    .top-btn.primary{
      background:var(--blue);
      border-color:var(--blue);
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:flex-end;
      padding:120px 6% 42px;
      background:
        linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.94) 86%),
        radial-gradient(circle at right,rgba(0,87,255,.35),transparent 38%),
        url("certificado.jpeg") center/cover no-repeat;
      position:relative;
    }

    .hero::after{
      content:"MX SCHOOL";
      position:absolute;
      right:-45px;
      bottom:20px;
      font-size:110px;
      font-weight:950;
      color:rgba(255,255,255,.045);
      pointer-events:none;
    }

    .hero-content{
      max-width:850px;
      position:relative;
      z-index:2;
    }

    .badge{
      display:inline-flex;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(0,87,255,.22);
      border:1px solid rgba(255,255,255,.18);
      color:#dbe8ff;
      font-weight:900;
      font-size:12px;
      letter-spacing:1px;
      margin-bottom:14px;
      backdrop-filter:blur(10px);
    }

    h1{
      font-size:clamp(42px,11vw,86px);
      line-height:.92;
      font-weight:950;
      text-transform:uppercase;
      text-shadow:0 10px 30px rgba(0,0,0,.75);
      margin-bottom:16px;
    }

    h1 span{color:var(--blue)}

    .subtitle{
      color:#ededed;
      font-size:clamp(17px,4.5vw,23px);
      line-height:1.45;
      max-width:760px;
      margin-bottom:20px;
      text-shadow:0 8px 22px rgba(0,0,0,.75);
    }

    .buttons{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:15px 16px;
      border-radius:15px;
      font-weight:900;
      transition:.25s;
      border:1px solid rgba(255,255,255,.14);
      min-height:52px;
      cursor:pointer;
      font-size:15px;
    }

    .btn:hover{transform:translateY(-3px);filter:brightness(1.05)}

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),#38bdf8);
      color:white;
      border-color:transparent;
    }

    .btn-secondary{
      background:rgba(255,255,255,.1);
      color:white;
      backdrop-filter:blur(10px);
    }

    .btn-whats{
      background:var(--whats);
      color:white;
      border-color:transparent;
    }

    section{padding:64px 6%}

    .section-title{
      font-size:clamp(30px,8vw,54px);
      line-height:1;
      text-transform:uppercase;
      margin-bottom:15px;
      font-weight:950;
    }

    .section-title span{color:var(--blue)}

    .section-text{
      color:var(--gray);
      font-size:17px;
      line-height:1.7;
      max-width:900px;
      margin-bottom:28px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }

    .card,.turma-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
      transition:.25s;
    }

    .card:hover,.turma-card:hover{
      transform:translateY(-5px);
      border-color:rgba(0,87,255,.75);
    }

    .card h3,.turma-card h3{
      color:#8fb5ff;
      font-size:22px;
      margin-bottom:10px;
      text-transform:uppercase;
    }

    .card p,.card li,.turma-card p{
      color:#ddd;
      line-height:1.6;
      font-size:15px;
    }

    .turma-card.esgotada{
      opacity:.72;
      border-color:rgba(239,68,68,.35);
    }

    .status{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      text-transform:uppercase;
      margin-bottom:12px;
    }

    .status.ok{
      background:rgba(34,197,94,.16);
      color:#bbf7d0;
      border:1px solid rgba(34,197,94,.35);
    }

    .status.danger{
      background:rgba(239,68,68,.16);
      color:#fecaca;
      border:1px solid rgba(239,68,68,.35);
    }

    .turma-data{
      font-size:38px;
      font-weight:950;
      color:#38bdf8;
      margin-bottom:8px;
      line-height:1;
    }

    .stats{
      background:
        radial-gradient(circle at top right,rgba(0,87,255,.24),transparent 38%),
        linear-gradient(180deg,#080808,#020202);
    }

    .stat-number{
      font-size:42px;
      font-weight:950;
      color:var(--blue);
      margin-bottom:8px;
    }

    ul{
      list-style:none;
      display:grid;
      gap:10px;
    }

    li::before{
      content:"✓ ";
      color:#38bdf8;
      font-weight:bold;
    }

    .certificado{
      display:grid;
      grid-template-columns:1fr;
      gap:24px;
      align-items:center;
    }

    .certificado img{
      width:100%;
      border-radius:24px;
      border:1px solid var(--border);
      box-shadow:0 25px 70px rgba(0,0,0,.45);
    }

    .form-section{
      background:
        linear-gradient(135deg,rgba(0,87,255,.34),rgba(56,189,248,.12)),
        #070707;
    }

    .form-box{
      background:rgba(255,255,255,.08);
      border:1px solid var(--border);
      border-radius:28px;
      padding:22px;
      box-shadow:0 20px 60px rgba(0,0,0,.4);
      max-width:980px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    label{
      font-size:13px;
      color:#dbe8ff;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:6px;
      display:block;
    }

    input,select,textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.35);
      color:white;
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    input::placeholder,textarea::placeholder{color:#8f8f8f}
    select option{color:#111}

    .form-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:14px;
    }

    .preview{
      margin-top:18px;
      padding:16px;
      background:rgba(0,0,0,.28);
      border:1px dashed rgba(255,255,255,.18);
      border-radius:18px;
      color:#dcdcdc;
      font-size:14px;
      line-height:1.55;
      white-space:pre-wrap;
    }

    .nav-pages{
      background:#080808;
    }

    .portal-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .portal-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:22px;
      transition:.25s;
    }

    .portal-card:hover{
      transform:translateY(-4px);
      border-color:rgba(0,87,255,.75);
    }

    .portal-card h3{
      color:white;
      font-size:20px;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .portal-card p{
      color:#d4d4d4;
      line-height:1.55;
      font-size:14px;
    }

    .cta{
      text-align:center;
      background:
        linear-gradient(135deg,rgba(0,87,255,.42),rgba(56,189,248,.14)),
        #050505;
    }

    .cta h2{
      font-size:clamp(34px,9vw,66px);
      text-transform:uppercase;
      line-height:.98;
      margin-bottom:16px;
    }

    .cta p{
      color:#eee;
      font-size:18px;
      line-height:1.6;
      max-width:760px;
      margin:0 auto 24px;
    }

    footer{
      background:#030303;
      color:#999;
      text-align:center;
      padding:30px 6% 95px;
      font-size:13px;
      line-height:1.6;
    }

    .floating-whatsapp{
      position:fixed;
      left:16px;
      right:16px;
      bottom:15px;
      background:var(--whats);
      color:white;
      padding:15px 18px;
      border-radius:999px;
      font-weight:950;
      z-index:120;
      box-shadow:0 10px 34px rgba(0,0,0,.48);
      text-align:center;
    }

    @media(min-width:820px){
      .topbar{padding:16px 7%}
      .brand{font-size:18px}
      .top-btn{font-size:13px;padding:10px 14px}
      .hero{padding:130px 7% 70px}
      section{padding:84px 7%}
      .buttons{display:flex;flex-wrap:wrap}
      .buttons .btn{min-width:190px}
      .grid{grid-template-columns:repeat(3,1fr)}
      .certificado{grid-template-columns:1fr 1fr}
      .form-grid{grid-template-columns:repeat(2,1fr)}
      .full{grid-column:1/-1}
      .form-actions{grid-template-columns:1fr 1fr}
      .portal-grid{grid-template-columns:repeat(4,1fr)}
      .floating-whatsapp{
        left:auto;
        right:22px;
        bottom:22px;
        width:auto;
        padding:16px 22px;
      }
      footer{padding-bottom:34px}
    }

    @media(max-width:520px){
      .top-actions .hide-mobile{display:none}
      .hero{min-height:92vh;background-position:center top}
      .buttons{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

    <a class="brand" href="https://jardinagem

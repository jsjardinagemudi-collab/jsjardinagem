<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guia de Terras | Rei do Real Casa e Jardim</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --vermelho:#a7271d;
      --amarelo:#ffe15a;
      --verde:#2f6b28;
      --verde-claro:#eaf4dc;
      --bege:#f7f0df;
      --dourado:#c79421;
      --texto:#2b2b1f;
    }

    body {
      font-family: Arial, sans-serif;
      background:var(--bege);
      color:var(--texto);
      padding-bottom:95px;
    }

    .header-logo{
      background:#b11f17;
      padding:0;
      border-bottom:6px solid #c79421;
      overflow:hidden;
    }

    .logo-banner{
      width:100%;
      display:block;
      margin:auto;
    }

    .container {
      width:min(1180px,94%);
      margin:auto;
      padding:20px 0;
    }

    .box {
      background:white;
      border-radius:18px;
      padding:17px;
      margin-bottom:18px;
      box-shadow:0 5px 16px rgba(0,0,0,.10);
      border:1px solid #eee0bd;
    }

    h2 {
      color:var(--vermelho);
      margin-bottom:8px;
      font-size:1.25rem;
    }

    .aviso {
      background:#fff6d6;
      border-left:6px solid var(--dourado);
      padding:13px;
      border-radius:12px;
      margin-bottom:14px;
      font-weight:bold;
    }

    .mineiro {
      color:var(--verde);
      font-weight:900;
    }

    .filtros {
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .grupo-filtro strong {
      display:block;
      margin-bottom:7px;
      color:var(--verde);
    }

    .botoes {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .botoes button {
      border:none;
      border-radius:999px;
      padding:10px 13px;
      background:#efe7d4;
      font-weight:bold;
      cursor:pointer;
      color:#402b19;
    }

    .botoes button.ativo {
      background:var(--vermelho);
      color:var(--amarelo);
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
    }

    .card {
      background:white;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 4px 14px rgba(0,0,0,.12);
      border:1px solid #ead9ae;
      display:flex;
      flex-direction:column;
    }

    .produto-icone {
      height:120px;
      background:linear-gradient(135deg,#eef6e7,#fff8e8);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:3rem;
    }

    .card-body {
      padding:14px;
      flex:1;
    }

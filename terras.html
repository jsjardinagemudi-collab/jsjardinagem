<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Guia de Terras - Atualização</title>
<style>
body{font-family:Arial,sans-serif;margin:30px}
.btn{padding:10px 16px;margin:6px;border:none;border-radius:8px;background:#a7271d;color:#fff;cursor:pointer}
input{padding:10px;width:300px}
</style>
<script>
function limparBusca(){
  const b=document.getElementById('busca');
  if(b){ b.value=''; b.focus(); }
  if(window.renderizarProdutos){ renderizarProdutos(); }
}
function limparEstimativa(){
  if(window.selecionados){
    Object.keys(selecionados).forEach(k=>selecionados[k]=0);
  }
  if(window.renderizarProdutos){ renderizarProdutos(); }
  if(window.atualizarEstimativa){ atualizarEstimativa(); }
  if(document.getElementById('resultadoCalc')){
    document.getElementById('resultadoCalc').innerHTML='Informe a medida para receber uma estimativa.';
  }
  ['areaM2','profundidadeCm'].forEach(id=>{
    const e=document.getElementById(id);
    if(e) e.value='';
  });
}
</script>
</head>
<body>
<h2>Trecho para adicionar ao seu HTML</h2>
<p>Adicione estes botões:</p>
<input id="busca" placeholder="Buscar">
<button class="btn" onclick="limparBusca()">Limpar busca</button>
<button class="btn" onclick="limparEstimativa()">Limpar estimativa</button>
<p>Copie as funções JavaScript deste arquivo para o seu HTML atual.</p>
</body>
</html>

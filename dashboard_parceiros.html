<script>

const CONFIG = {
  VIEW_CSV_URL:"https://docs.google.com/spreadsheets/d/e/2PACX-1vT8Ksrg7iVCFEH-eNZKwzAEalV6iN5NN2srX65ORIfJv6jPZkgf6WbIua5sJrWfcS8aQL4wfGnDvIOq/pub?gid=1879002658&single=true&output=csv",
  FORM_URL:"https://docs.google.com/forms/d/e/1FAIpQLSeVNqbXkVVa36NiHq0JO-l5_zl6rLdXPb-nweoQNfyfuXkaTg/viewform",
  AUTO_REFRESH_MS:60000,

COLUMNS:{
idShort:["ID_SHORT"],
dataServico:["DATA_SERVICO"],
cliente:["CLIENTE"],
telefone:["TELEFONE"],
endereco:["ENDERECO"],
bairro:["BAIRRO"],
descricao:["DESCRICAO"],
responsavel:["RESPONSAVEL_ENVIO"],
status:["STATUS"],
qtdLider:["QTD_LIDER"],
qtdJardineiro:["QTD_JARDINEIRO"],
qtdAuxiliar:["QTD_AUXILIAR"],
equipeTotal:["EQUIPE_TOTAL"],
horas:["HORAS"],
precoFinal:["PRECO_FINAL"],
valorParceiro:["VALOR_PARCEIRO"],
ganhoHora:["GANHO_POR_HORA"],
tipoParceria:["TIPO_PARCERIA"],
proximaAcao:["PROXIMA_ACAO"]
}

}

const $=(s)=>document.querySelector(s)

function norm(v){return String(v??"").trim()}

function parseNumber(v){
const s=norm(v)
.replace(/\s/g,"")
.replace(/[R$]/g,"")
.replace(/\.(?=\d{3})/g,"")
.replace(",",".")
const x=Number(s)
return isFinite(x)?x:NaN
}

function fmtBRL(n){
const x=Number(n)
if(!isFinite(x))return"—"
return x.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

function parseCSV(text){
const rows=text.split("\n").map(r=>r.split(","))
const header=rows.shift()
return rows.map(r=>{
let o={}
header.forEach((h,i)=>o[h]=r[i])
return o
})
}

function getValue(row,aliases){
for(const k of aliases){
if(row[k]&&norm(row[k])!="")return row[k]
}
return ""
}

function badgeStatus(st){

const x=norm(st).toLowerCase()

if(["urgente"].includes(x))
return `<span class="badge b-bad">URGENTE</span>`

if(["disponivel","disponível"].includes(x))
return `<span class="badge b-ok">Disponível</span>`

if(["em serviço","em servico"].includes(x))
return `<span class="badge b-pri">Em serviço</span>`

return `<span class="badge b-id">${st||"—"}</span>`
}

let ALL=[]
let VIEW=[]

function normalizeRow(raw){

const c=CONFIG.COLUMNS

return{

idShort:norm(getValue(raw,c.idShort)),
dataServico:norm(getValue(raw,c.dataServico)),
cliente:norm(getValue(raw,c.cliente)),
bairro:norm(getValue(raw,c.bairro)),
descricao:norm(getValue(raw,c.descricao)),
responsavel:norm(getValue(raw,c.responsavel)),
status:norm(getValue(raw,c.status)),

qtdLider:parseNumber(getValue(raw,c.qtdLider)),
qtdJardineiro:parseNumber(getValue(raw,c.qtdJardineiro)),
qtdAuxiliar:parseNumber(getValue(raw,c.qtdAuxiliar)),
equipeTotal:parseNumber(getValue(raw,c.equipeTotal)),
horas:parseNumber(getValue(raw,c.horas)),

precoFinal:parseNumber(getValue(raw,c.precoFinal)),
valorParceiro:parseNumber(getValue(raw,c.valorParceiro)),
ganhoHora:parseNumber(getValue(raw,c.ganhoHora)),

tipoParceria:norm(getValue(raw,c.tipoParceria)),
proximaAcao:norm(getValue(raw,c.proximaAcao))

}
}

function applyFilters(){

const q=norm($("#qSearch").value).toLowerCase()

VIEW=ALL.filter(r=>{

const hay=[
r.idShort,
r.cliente,
r.bairro,
r.descricao,
r.tipoParceria
].join(" ").toLowerCase()

if(q&&!hay.includes(q))return false

return true

})

render()

}

function render(){

const el=$("#cards")
el.innerHTML=""

VIEW.forEach(r=>{

const card=document.createElement("div")
card.className="job"

card.innerHTML=`

<div>

<h3>${r.idShort} • ${r.bairro}</h3>
<p class="job-sub">${r.cliente} • ${r.dataServico}</p>

<div class="badges">

${badgeStatus(r.status)}

<span class="badge b-id">ID ${r.idShort}</span>

</div>

<div class="desc">
<p class="k">Descrição</p>
<p class="v">${r.descricao}</p>
</div>

<div class="grid3">

<div class="kv">
<p class="k">Equipe</p>
<p class="v">${r.equipeTotal}</p>
</div>

<div class="kv">
<p class="k">Horas</p>
<p class="v">${r.horas}</p>
</div>

<div class="kv">
<p class="k">Responsável</p>
<p class="v">${r.responsavel}</p>
</div>

</div>

<div class="grid3">

<div class="kv">
<p class="k">Ganho parceiro</p>
<p class="v">${fmtBRL(r.valorParceiro)}</p>
</div>

<div class="kv">
<p class="k">Ganho por hora</p>
<p class="v">${fmtBRL(r.ganhoHora)}</p>
</div>

<div class="kv">
<p class="k">Preço final</p>
<p class="v">${fmtBRL(r.precoFinal)}</p>
</div>

</div>

</div>

<div class="cta">

<div class="pricebox">

<p class="label">Ganho parceiro</p>
<p class="price">💰 ${fmtBRL(r.valorParceiro)}</p>

</div>

<a class="btn-take" href="${CONFIG.FORM_URL}" target="_blank">
Aceitar serviço
</a>

</div>

`

el.appendChild(card)

})

}

async function loadData(){

const res=await fetch(CONFIG.VIEW_CSV_URL)

const csv=await res.text()

ALL=parseCSV(csv).map(normalizeRow)

ALL.sort((a,b)=>{

const d1=new Date(a.dataServico.split("/").reverse().join("-"))
const d2=new Date(b.dataServico.split("/").reverse().join("-"))

return d1-d2

})

applyFilters()

}

$("#btnRefresh").onclick=loadData
$("#qSearch").oninput=applyFilters

setInterval(loadData,CONFIG.AUTO_REFRESH_MS)

loadData()

</script>

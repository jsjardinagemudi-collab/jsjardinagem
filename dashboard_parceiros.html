<!doctype html>
<html lang="pt-BR">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal do Jardineiro • JS</title>

<style>

body{
font-family:Arial;
background:#f5f7f8;
margin:0;
}

header{
background:#114084;
color:white;
padding:16px;
font-size:20px;
font-weight:bold;
}

.wrap{
width:95%;
max-width:1200px;
margin:auto;
}

.panel{
background:white;
border-radius:10px;
margin-top:20px;
padding:16px;
}

.filters{
display:flex;
gap:10px;
margin-bottom:12px;
}

input,select{
padding:8px;
border:1px solid #ddd;
border-radius:6px;
}

.cards{
display:grid;
gap:14px;
}

.job{
display:grid;
grid-template-columns:1fr 260px;
gap:14px;
padding:14px;
border:1px solid #e5e7ea;
border-radius:12px;
background:white;
}

.badge{
padding:4px 8px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.ok{background:#e7f7ee;color:#027a48}
.warn{background:#fff3cd;color:#b54708}
.bad{background:#fdecea;color:#b42318}

.kv{
border:1px solid #eee;
border-radius:10px;
padding:8px;
}

.price{
font-size:26px;
color:#114084;
font-weight:bold;
}

.btn{
display:block;
padding:10px;
border-radius:8px;
text-align:center;
text-decoration:none;
background:#114084;
color:white;
font-weight:bold;
margin-top:8px;
}

</style>
</head>

<body>

<header>Portal do Jardineiro • Serviços disponíveis</header>

<div class="wrap">

<div class="panel">

<div class="filters">

<input id="search" placeholder="Buscar serviço">

<select id="bairro">
<option value="">Bairro</option>
</select>

<select id="status">
<option value="">Status</option>
</select>

<button onclick="loadData()">Atualizar</button>

</div>

<div id="cards" class="cards"></div>

</div>

</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vT8Ksrg7iVCFEH-eNZKwzAEalV6iN5NN2srX65ORIfJv6jPZkgf6WbIua5sJrWfcS8aQL4wfGnDvIOq/pub?gid=1879002658&single=true&output=csv"

let DATA=[]
let VIEW=[]

function parseCSV(text){

const lines=text.trim().split("\n")

const header=lines.shift().split(",")

return lines.map(l=>{
const obj={}
const row=l.split(",")
header.forEach((h,i)=>obj[h]=row[i])
return obj
})

}

function num(v){

if(!v) return NaN

v=v.replace(/[R$]/g,"")
v=v.replace(/\./g,"")
v=v.replace(",",".")
return Number(v)

}

function money(v){

if(!v) return "—"

return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})

}

function badge(status){

status=(status||"").toLowerCase()

if(status.includes("dispon"))
return `<span class="badge ok">Disponível</span>`

if(status.includes("urgente"))
return `<span class="badge bad">Urgente</span>`

return `<span class="badge warn">${status}</span>`

}

function normalize(r){

return{

id:r.ID_SHORT,

data:r.DATA_SERVICO,

cliente:r.CLIENTE,

bairro:r.BAIRRO,

descricao:r.DESCRICAO,

status:r.STATUS,

qL:r.QTD_LIDER,

qJ:r.QTD_JARDINEIRO,

qA:r.QTD_AUXILIAR,

equipe:r.EQUIPE_TOTAL,

horas:r.HORAS,

preco:num(r.PRECO_FINAL),

parceiro:num(r.VALOR_PARCEIRO),

hora:num(r.GANHO_POR_HORA),

endereco:r.ENDERECO,

tipo:r.TIPO_PARCERIA,

acao:r.PROXIMA_ACAO

}

}

function applyFilters(){

const q=document.getElementById("search").value.toLowerCase()

VIEW=DATA.filter(r=>{

let text=(r.id+" "+r.bairro+" "+r.cliente+" "+r.descricao).toLowerCase()

if(q && !text.includes(q)) return false

return true

})

render()

}

function render(){

const el=document.getElementById("cards")

el.innerHTML=""

VIEW.forEach(r=>{

const maps=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.endereco||r.bairro)}`

const card=document.createElement("div")

card.className="job"

card.innerHTML=`

<div>

<b>${r.id}</b> • ${r.bairro}<br>
${r.cliente} • ${r.data}

<br><br>

${badge(r.status)}

<p>${r.descricao}</p>

<div class="kv">Equipe: ${r.equipe}</div>
<div class="kv">Horas: ${r.horas}</div>

<div class="kv">Ganho parceiro: ${money(r.parceiro)}</div>
<div class="kv">Ganho hora: ${money(r.hora)}</div>

<div class="kv">Preço final: ${money(r.preco)}</div>

</div>

<div>

<div class="price">${money(r.parceiro)}</div>

<a class="btn" href="${maps}" target="_blank">Ver mapa</a>

</div>

`

el.appendChild(card)

})

}

async function loadData(){

const res=await fetch(CSV_URL)

const text=await res.text()

DATA=parseCSV(text).map(normalize)

DATA.sort((a,b)=>{

const d1=new Date(a.data.split("/").reverse().join("-"))

const d2=new Date(b.data.split("/").reverse().join("-"))

return d1-d2

})

applyFilters()

}

document.getElementById("search").addEventListener("input",applyFilters)

loadData()

setInterval(loadData,60000)

</script>

</body>
</html>
